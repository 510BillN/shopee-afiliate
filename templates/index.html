<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Link Shopee Affiliate</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-2xl">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Đổi link Shopee Affiliate</h1>
        <p class="text-sm text-slate-500 mb-6">Chuyển đổi link thường thành link Affiliate (Gắn thẻ Instagram)</p>

        <div class="border border-slate-200 rounded-xl p-6 bg-slate-50">
            <label class="block text-sm font-medium text-slate-700 mb-2">Nhập link Shopee</label>
            <input type="text" id="shopeeLink" placeholder="https://shopee.vn/..." 
                class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
            
            <div class="flex gap-3">
                <button onclick="pasteClipboard()" class="flex-1 bg-white border border-slate-300 text-slate-700 font-semibold py-2 px-4 rounded-lg hover:bg-slate-50 transition">
                    Dán sản phẩm
                </button>
                <button onclick="convertLink()" id="btnConvert" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg shadow-md transition">
                    Nhận Affiliate
                </button>
                <button onclick="copyResult()" class="flex-1 bg-white border border-slate-300 text-slate-700 font-semibold py-2 px-4 rounded-lg hover:bg-slate-50 transition">
                    Sao chép
                </button>
            </div>

            <div class="mt-4">
                <p id="statusMsg" class="text-sm font-medium text-green-600 hidden">Đã lấy link thành công!</p>
                <input type="text" id="resultLink" readonly class="w-full mt-2 px-4 py-2 bg-slate-200 rounded-lg border-none text-slate-700 hidden">
            </div>
        </div>
    </div>

    <script>
        // Logic xu ly nut bam giao dien
        async function pasteClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('shopeeLink').value = text;
            } catch (err) {
                alert('Trình duyệt chưa cấp quyền dán tự động. Hãy dán thủ công nhé!');
            }
        }

        async function convertLink() {
            const urlInput = document.getElementById('shopeeLink').value;
            const btn = document.getElementById('btnConvert');
            const statusMsg = document.getElementById('statusMsg');
            const resultLink = document.getElementById('resultLink');

            if(!urlInput) {
                alert('Vui lòng nhập link Shopee!'); return;
            }

            btn.innerText = "Đang xử lý...";
            btn.classList.add("opacity-75", "cursor-not-allowed");

            try {
                // Goi xuong API Python phia sau de lay link
                const response = await fetch(`/api/get-affiliate?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if(data.status === 'success') {
                    resultLink.value = data.affiliate_link;
                    resultLink.classList.remove('hidden');
                    statusMsg.innerText = "Thành công!";
                    statusMsg.className = "text-sm font-medium text-green-600 block";
                } else {
                    statusMsg.innerText = "Lỗi: Cookie hết hạn hoặc sai link!";
                    statusMsg.className = "text-sm font-medium text-red-600 block";
                }
            } catch (error) {
                statusMsg.innerText = "Lỗi kết nối máy chủ!";
                statusMsg.className = "text-sm font-medium text-red-600 block";
            }

            btn.innerText = "Nhận Affiliate";
            btn.classList.remove("opacity-75", "cursor-not-allowed");
        }

        function copyResult() {
            const resultLink = document.getElementById('resultLink');
            if(resultLink.value) {
                resultLink.select();
                document.execCommand("copy");
                alert("Đã sao chép link Affiliate!");
            }
        }
    </script>
</body>
</html>
